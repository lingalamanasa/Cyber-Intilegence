<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly || 404 Error</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(circle at center, rgba(0, 212, 255, 0.08) 0%, transparent 60%), var(--bg-primary);
      padding: 20px;
    }

    .error-icon {
      font-size: 6rem;
      color: var(--accent);
      margin-bottom: 20px;
      animation: pulse 2s infinite;
      text-shadow: 0 0 30px var(--accent-glow);
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .error-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .error-desc {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 500px;
      margin-bottom: 40px;
    }

    .error-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .brand-logo {
      position: absolute;
      top: 30px;
      left: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo img {
      height: 36px;
      border-radius: 8px;
    }

    .brand-logo span {
      font-size: 1.3rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

<a href="index.html" class="brand-logo">
  <img src="logo.webp" alt="Stackly Logo">
  <span>Stackly</span>
</a>

<div class="error-page">
  <div class="error-icon"><i class="bi bi-shield-x"></i></div>
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-desc">The requested resource could not be found. It may have been moved, deleted, or you might have clicked a broken link. Please return to the dashboard or home page.</p>
  
  <div class="error-actions">
    <a href="index.html" class="btn-primary">
      <i class="bi bi-house-door"></i> Back to Home
    </a>
    <a href="contact.html" class="btn-secondary">
      <i class="bi bi-headset"></i> Contact Support
    </a>
  </div>
</div>

</body>
</html>
